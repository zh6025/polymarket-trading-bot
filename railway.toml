# Railway configuration – https://docs.railway.com/reference/config-as-code
# This file tells Railway how to build and run the Polymarket trading bot.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Automatically restart the container if it crashes (e.g. transient network error)
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
