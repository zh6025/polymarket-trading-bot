name: 🚀 Deploy to AWS Tokyo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 支持手动触发

jobs:
  # ============ 第一步：测试 ============
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: ✅ Run unit tests
        run: |
          python -m pytest tests/ -v
          echo "✅ All tests passed"

      - name: 🔬 Dry-run smoke test
        env:
          API_KEY: demo-key
          API_SECRET: demo-secret
          API_PASSPHRASE: demo-passphrase
          DRY_RUN: "true"
          TRADING_ENABLED: "false"
          POLLING_INTERVAL: "5000"
          LOG_LEVEL: INFO
        run: |
          echo "Running bot_runner.py in observation mode..."
          timeout 15 python bot_runner.py || true
          echo "✅ Smoke test completed"

      - name: 🐳 Build Docker image
        run: |
          docker build -t polymarket-bot:test .
          echo "✅ Docker image built successfully"

  # ============ 第二步：SSH 部署到 AWS 东京 ============
  deploy:
    name: 🌏 Deploy to AWS Tokyo (ap-northeast-1)
    runs-on: ubuntu-latest
    needs: test          # 必须测试通过才部署
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_TOKYO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AWS_TOKYO_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via SSH
        env:
          HOST: ${{ secrets.AWS_TOKYO_HOST }}
          USER: ${{ secrets.AWS_TOKYO_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $USER@$HOST << 'ENDSSH'
            set -e
            echo "📂 Navigating to project directory..."
            cd ~/polymarket-trading-bot

            echo "📥 Pulling latest code from main..."
            git pull origin main

            echo "🐳 Rebuilding Docker image..."
            docker compose build --no-cache bot

            echo "🔄 Restarting bot container..."
            docker compose up -d --force-recreate bot

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "📊 Bot status:"
            docker compose ps

            echo "✅ Deployment complete!"
          ENDSSH

      - name: 📣 Notify deployment success
        if: success()
        run: |
          echo "🎉 Successfully deployed to AWS Tokyo VPS!"
          echo "Server: ${{ secrets.AWS_TOKYO_HOST }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
