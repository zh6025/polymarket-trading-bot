name: 🚀 Deploy to AWS Tokyo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🧪 Build & Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Run bot startup smoke test
        env:
          DRY_RUN: "true"
          CHECK_INTERVAL_SEC: "5"
        run: |
          echo "Running bot_continuous.py in dry-run mode..."
          timeout 30 python bot_continuous.py || true
          echo "✅ Smoke test completed"

      - name: 🐳 Build Docker image
        run: |
          docker build -t polymarket-bot:test .
          echo "✅ Docker image built successfully"

  deploy:
    name: 🌏 Deploy to AWS Tokyo (ap-northeast-1)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_TOKYO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AWS_TOKYO_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via SSH
        env:
          HOST: ${{ secrets.AWS_TOKYO_HOST }}
          USER: ${{ secrets.AWS_TOKYO_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $USER@$HOST << 'ENDSSH'
            set -e
            cd ~/polymarket-trading-bot
            git pull origin main
            docker-compose build --no-cache bot
            docker-compose up -d --force-recreate bot
            docker image prune -f
            docker-compose ps
          ENDSSH
