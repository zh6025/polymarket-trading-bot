name: 🚀 Deploy to AWS Tokyo VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Build & Test (Dry-Run)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Run bot dry-run test
        env:
          DRY_RUN: "true"
          TRADING_ENABLED: "false"

          POLYMARKET_HOST: "https://clob.polymarket.com"
          GAMMA_HOST: "https://gamma-api.polymarket.com"
          CHAIN_ID: "137"

          MIN_ORDER_SIZE: "5"
          MAX_POSITION_SIZE: "50"

          MAX_DAILY_LOSS: "30"
          MAX_TRADES_PER_DAY: "20"
          COOLDOWN_SECONDS: "30"

          HARD_STOP_NEW_ENTRY_SEC: "30"
          MIN_SECS_MAIN_ENTRY: "90"
          MIN_SECS_HEDGE_ENTRY: "60"

          MIN_MAIN_PRICE: "0.20"
          MAX_MAIN_PRICE: "0.66"
          MIN_HEDGE_PRICE: "0.03"
          MAX_HEDGE_PRICE: "0.25"

          MAX_MAIN_SPREAD: "0.03"
          MAX_HEDGE_SPREAD: "0.02"

          MIN_MAIN_DEPTH_USDC: "10"
          MIN_HEDGE_DEPTH_USDC: "5"

          MIN_WIN_PROB: "0.55"
          MAX_HEDGE_RATIO: "0.33"
          MIN_MEANINGFUL_HEDGE_RATIO: "0.05"

          ONE_POSITION_PER_MARKET: "true"
          CONSECUTIVE_LOSS_LIMIT: "3"
          DAILY_LOSS_LIMIT_USDC: "20"
          DAILY_TRADE_LIMIT: "20"

          STATE_FILE_PATH: "bot_state.json"
          DB_PATH: "bot_data.db"
          LOG_LEVEL: "INFO"
        run: |
          echo "Running bot_runner.py in dry-run mode..."
          timeout 30 python bot_runner.py || true
          echo "✅ Dry-run test completed"

      - name: 🐳 Build Docker image
        run: |
          docker build -t polymarket-bot:test .
          echo "✅ Docker image built successfully"

  deploy:
    name: 🌏 Deploy to AWS Tokyo (ap-northeast-1)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_TOKYO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AWS_TOKYO_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy via SSH
        env:
          HOST: ${{ secrets.AWS_TOKYO_HOST }}
          USER: ${{ secrets.AWS_TOKYO_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $USER@$HOST << 'ENDSSH'
            set -e
            echo "📂 Navigating to project directory..."
            cd ~/polymarket-trading-bot

            echo "📥 Pulling latest code from main..."
            git pull origin main

            echo "🐳 Rebuilding Docker image..."
            docker-compose build --no-cache bot

            echo "🔄 Restarting bot container..."
            docker-compose up -d --force-recreate bot

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "📊 Bot status:"
            docker-compose ps

            echo "✅ Deployment complete!"
          ENDSSH

      - name: 📣 Notify deployment success
        if: success()
        run: |
          echo "🎉 Successfully deployed to AWS Tokyo VPS!"
          echo "Server: ${{ secrets.AWS_TOKYO_HOST }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
