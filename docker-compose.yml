services:
  # ── Production bot (single-shot runner via cron) ──────────────────────────
  bot:
    build: .
    container_name: polymarket-bot
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./bot_state.json:/app/bot_state.json
      - ./bot_data.db:/app/bot_data.db
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Continuous market-making loop ────────────────────────────────────────
  bot-continuous:
    build: .
    container_name: polymarket-bot-continuous
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./bot_data.db:/app/bot_data.db
      - ./logs:/app/logs
    command: ["python", "bot_continuous.py"]
    networks:
      - bot-network
    profiles:
      - continuous

  # ── Web monitoring dashboard ─────────────────────────────────────────────
  dashboard:
    build: .
    container_name: polymarket-dashboard
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: ["python", "web_dashboard.py"]
    volumes:
      - ./bot_data.db:/app/bot_data.db
      - ./logs:/app/logs
    networks:
      - bot-network
    profiles:
      - dashboard
    restart: unless-stopped

networks:
  bot-network:
    driver: bridge
