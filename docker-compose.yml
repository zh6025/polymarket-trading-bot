
services:
  # ============ 主交易机器人 ============
  bot:
    build: .
    container_name: polymarket-bot
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-true}
      - TRADING_ENABLED=${TRADING_ENABLED:-false}
      - POLLING_INTERVAL=${POLLING_INTERVAL:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STATE_FILE=data/bot_state.json
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - bot-network
    profiles:
      - live
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ============ 干跑观察模式（独立容器）============
  bot-dryrun:
    build: .
    container_name: polymarket-bot-dryrun
    env_file:
      - .env
    environment:
      - DRY_RUN=true
      - TRADING_ENABLED=true
      - POLLING_INTERVAL=5000
      - LOG_LEVEL=INFO
      - STATE_FILE=data/bot_state.json
    volumes:
      - ./data/dryrun:/app/data
    restart: unless-stopped
    networks:
      - bot-network
    profiles:
      - dryrun
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  bot-network:
    driver: bridge
