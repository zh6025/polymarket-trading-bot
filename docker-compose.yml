
services:
  # ============ 末端狙击机器人（实盘）============
  bot:
    build: .
    container_name: polymarket-bot
    env_file:
      - .env
    environment:
      - SERIES_SLUG=btc-up-or-down-5m
      - DRY_RUN=${DRY_RUN:-true}
      - POLLING_INTERVAL=${POLLING_INTERVAL:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STATE_FILE=/app/data/bot_state.json
      - LOG_DIR=/app/logs
    command: ["python", "bot_sniper.py"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  bot-network:
    driver: bridge
