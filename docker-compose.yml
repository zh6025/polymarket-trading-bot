services:
  bot:
    build: .
    container_name: polymarket-bot
    env_file:
      - .env
    environment:
      - DRY_RUN=${DRY_RUN:-true}
      - ORDER_SIZE=${ORDER_SIZE:-5}
      - CHECK_INTERVAL_SEC=${CHECK_INTERVAL_SEC:-5}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  bot-network:
    driver: bridge
