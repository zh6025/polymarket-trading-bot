services:
  polymarket-bot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: polymarket-bot
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../bot_state.json:/app/bot_state.json
      - ../logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
