# =============================================================================
# Polymarket Trading Bot - Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Main trading bot
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: polymarket-bot:latest
    container_name: polymarket-bot
    restart: unless-stopped

    env_file:
      - ../.env

    environment:
      - PYTHONUNBUFFERED=1

    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs

    # Resource limits (adjust to your Linode plan)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 128M
          cpus: '0.10'

    # Container-level health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # JSON-file logging with rotation
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - bot-network

  # ---------------------------------------------------------------------------
  # Adminer — lightweight DB browser (optional, disable if not needed)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:4
    container_name: polymarket-adminer
    restart: unless-stopped

    ports:
      - "${ADMINER_PORT:-8080}:8080"

    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

    networks:
      - bot-network

# =============================================================================
# Named volumes — persisted on the host under /var/lib/docker/volumes/
# =============================================================================
volumes:
  bot_data:
    driver: local
  bot_logs:
    driver: local

# =============================================================================
# Network
# =============================================================================
networks:
  bot-network:
    driver: bridge
